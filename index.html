<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <title>Site 2</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="hero-section">
        <div class="container">
            <header>
                <nav>
                    <div class="logo">

                    <ul class="menu">

            <div class="resultado-numeros">

                </p>
